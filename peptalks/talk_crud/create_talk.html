<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="create_talk.css">
        <title>Create PEP Talk</title>
    </head>
    <body>
        <aside>
            <div class="image_container" id="image_container">
                <h2>Image</h2>
                <img src="../images/placeholder.svg" alt="" id="image" />
                <input type="file" name="image_file_input" id="image_file_input" />
            </div>
            <div class="link_btn_container">
                <button id="delete_talk">Delete</button>
                <button id="copy_talk">Copy</button>
                <button id="share_talk">Share</button>
            </div>
        </aside>
        <main>
            <!-- Talk Info -->
            <section>
                <h2>Pep Talk Title & Description</h2>
                <form class="talk_info_form" id="talk_info_form"  action="">
                    <div class="info_container">
                        <input type="text" name="title" id="title" placeholder="PEP Talk Title" />
                        <input type="text" name="description" id="description" placeholder="Theme or Description" />
                    </div>
                    <input type="submit" id="save_talk_info" value="Save" />
                </form>
            </section>
            <!-- Co-hosts Form -->
            <section>
                <form class="co_host_form" id="co_host_form" action="">
                    <input type="text" name="co_host" id="co_host" />
                    <input type="submit" id="add_co_host" value="Send" />
                </form>
            </section>
            <!-- Attendee Table -->
            <section>
                <table id="attendees_table">
                    <thead>
                        <tr>
                            <th>Name / Email</th>
                            <th>Role</th>
                            <th></th>   <!-- Edit -->
                            <th></th>   <!-- Message -->
                            <th></th>   <!-- Delete -->
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>First Last Name</td>
                            <td>address@email.com</td>
                            <td>Edit</td>
                            <td>Message</td>
                            <td>Delete</td>
                        </tr>
                    </tbody>
                </table>
            </section>
            <!-- Popups -->
            <div class="popup" id="url_copied">Copied URL!</div>
        </main>
    </body>
</html>
